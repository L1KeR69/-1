name: LMS project structure check

on:
  push:
  pull_request:

jobs:
  check-required-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f README.md
          test -f PROJECT_CARD.md
          test -f CHANGELOG.md
          test -f docs/problem_statement.md
          test -f docs/metrics.md
          test -f data/README.md
